<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rezept Würfel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --dark: #1C1A17;
    --accent: #C8A96E;
    --accent-light: #E8D5B0;
    --muted: #8A8070;
    --card: #FFFFFF;
    --border: #EDE8DF;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    width: 100%;
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 8vw, 42px);
    font-weight: 600;
    line-height: 1.15;
    color: var(--dark);
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Main content */
  .main {
    width: 100%;
    max-width: 440px;
    padding: 36px 20px 0;
  }

  /* Category chips */
  .section-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 14px;
    text-align: center;
  }

  .categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 32px;
  }

  .cat-btn {
    position: relative;
    padding: 16px 12px;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .cat-btn:active { transform: scale(0.97); }

  .cat-btn.active {
    border-color: var(--accent);
    background: var(--accent);
  }

  .cat-icon {
    font-size: 26px;
    display: block;
    margin-bottom: 6px;
    line-height: 1;
  }

  .cat-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--dark);
    display: block;
  }

  .cat-btn.active .cat-name { color: #fff; }

  .cat-count {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .cat-btn.active .cat-count { color: rgba(255,255,255,0.75); }

  .cat-check {
    position: absolute;
    top: 8px;
    right: 10px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: none;
    align-items: center;
    justify-content: center;
  }

  .cat-btn.active .cat-check {
    display: flex;
  }

  .cat-check::after {
    content: '✓';
    font-size: 10px;
    color: white;
    font-weight: 700;
  }

  /* Roll button */
  .roll-wrap {
    margin-bottom: 32px;
  }

  .roll-btn {
    width: 100%;
    padding: 20px;
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-style: italic;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .roll-btn:active { transform: scale(0.98); background: #333; }
  .roll-btn:disabled { opacity: 0.5; cursor: default; }

  .roll-btn .dice {
    font-size: 22px;
    display: inline-block;
    transition: transform 0.3s;
  }

  .roll-btn.rolling .dice {
    animation: spin 0.4s ease-in-out;
  }

  @keyframes spin {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.4); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Result card */
  .result-card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 24px;
    border: 1px solid var(--border);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.35s ease;
    pointer-events: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  .result-card.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .result-cat-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(17px, 5vw, 22px);
    font-weight: 600;
    line-height: 1.3;
    color: var(--dark);
    margin-bottom: 22px;
  }

  .result-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    background: var(--cream);
    border: 1.5px solid var(--accent);
    color: var(--dark);
    text-decoration: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .result-link:active { background: var(--accent-light); transform: scale(0.98); }

  .result-link svg {
    width: 14px; height: 14px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .again-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .again-btn:active { border-color: var(--accent); color: var(--accent); transform: scale(0.98); }

  /* No selection warning */
  .warning {
    text-align: center;
    padding: 16px;
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .warning.show { opacity: 1; }

  /* Footer */
  .footer {
    margin-top: 48px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>

let activeCats = new Set(['fruehstueck','mittagessen','abendessen','dessert']);

function toggleCat(btn) {
  const cat = btn.dataset.cat;
  if (activeCats.has(cat)) {
    if (activeCats.size === 1) return; // keep at least one
    activeCats.delete(cat);
    btn.classList.remove('active');
  } else {
    activeCats.add(cat);
    btn.classList.add('active');
  }
  document.getElementById('warning').classList.remove('show');
}

function roll() {
  if (activeCats.size === 0) {
    document.getElementById('warning').classList.add('show');
    return;
  }

  const btn = document.getElementById('rollBtn');
  btn.classList.add('rolling');
  setTimeout(() => btn.classList.remove('rolling'), 400);

  const pool = [];
  activeCats.forEach(cat => {
    CATS[cat].recipes.forEach(r => pool.push({ ...r, cat }));
  });

  const pick = pool[Math.floor(Math.random() * pool.length)];

  const card = document.getElementById('resultCard');
  card.classList.remove('visible');

  setTimeout(() => {
    document.getElementById('resultCat').textContent = CATS[pick.cat].label;
    document.getElementById('resultTitle').textContent = pick.title;
    const link = document.getElementById('resultLink');
    link.dataset.url = pick.url;
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 200);
}

function openRecipe() {
  const url = document.getElementById("resultLink").dataset.url;
  if (url) window.open(url, "_blank");
}
